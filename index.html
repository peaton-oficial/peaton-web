<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peaton</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  
<style>

@font-face {
  font-family: "Bernier";
  src: url("./fonts/BERNIERDistressed-Regular.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:#f5f5f5;
    font-family: Arial, sans-serif;
    line-height:1.6;
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    gap:10px;
}

.logo {
    width: min(70vw, 650px);
    height: auto;
    margin-bottom: 10px;
}
.subtitle{
    font-size:1.15rem;
    opacity:0.85;
    max-width:650px;
    margin-bottom:20px;
}

.links{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
}

.links a{
    font-family: "Bernier";
    font-size: 28px;
    letter-spacing: 2px;
    color:white;
    text-decoration:none;
    border:1px solid rgba(255,255,255,.4);
    padding:18px 30px;
    border-radius:10px;
    display:flex;
    align-items:center;
    gap:12px;
    background:rgba(255,255,255,.03);
    transition:0.3s;
}

.links a:hover{
    background:white;
    color:black;
}

.about{
    max-width:900px;
    margin:auto;
    padding:80px 20px;
}

.about h2{
    margin-bottom:20px;
    font-size:2rem;
}

.music{
    max-width:900px;
    margin:auto;
    padding:40px 20px 80px;
}

.music h2{
    margin-bottom:20px;
    font-size:2rem;
}

.spotify{
    width:100%;
    border:none;
    border-radius:12px;
}

footer{
    text-align:center;
    padding:40px 20px;
    opacity:.6;
    font-size:.9rem;
}

</style>
</head>

<body>

<section class="hero">

   <img src="LOGOBLANTRANSPARENTE.png" alt="Peaton" class="logo">

   

 <div class="links">

    <a href="https://open.spotify.com/intl-es/artist/5wCnwICfz1G8yIcCwIAzLd?si=UTqGV539R5KnRdo-3IZC5w" target="_blank">
        <i class="fa-brands fa-spotify"></i>
        SPOTIFY
    </a>

    <a href="https://www.youtube.com/channel/UCSzZDLWp3fVo-8JgkBtrsYQ" target="_blank">
        <i class="fa-brands fa-youtube"></i>
        YOUTUBE
    </a>

    <a href="https://www.instagram.com/peaton_oficial/" target="_blank">
        <i class="fa-brands fa-instagram"></i>
        INSTAGRAM
    </a>

    <a href="https://www.facebook.com/peatonoficial/?locale=es_LA" target="_blank">
        <i class="fa-brands fa-facebook-f"></i>
        FACEBOOK
    </a>

</div>

</section>

<section class="about">

    <h2>Sobre Peaton</h2>

    <p>
        Peaton es el proyecto musical de Pablo Pantigozo.
        Desde Arequipa, sus canciones exploran historias
        cotidianas, emociones y paisajes sonoros que
        combinan sensibilidad acústica y producción contemporánea.
    </p>

</section>

<section class="music">

    <h2>Escucha la música</h2>

    <!-- Reemplaza el src por el código embed de Spotify -->

   <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/artist/5wCnwICfz1G8yIcCwIAzLd?utm_source=generator&si=a1ecb39c6ad84786" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

</section>

<footer>
    © 2026 Peaton
</footer>

</body>
</html>
